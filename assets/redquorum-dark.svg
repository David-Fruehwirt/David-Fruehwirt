<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320" viewBox="0 0 1100 320" role="img" aria-labelledby="title desc">
  <title id="title">RedQuorum security consensus</title>
  <desc id="desc">Three contained panels show target scanning, four security agents evaluating a finding, and a verified consensus result.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#211a1d"/><stop offset="1" stop-color="#15171c"/></linearGradient>
    <clipPath id="a"><rect x="40" y="96" width="320" height="184" rx="14"/></clipPath><clipPath id="b"><rect x="390" y="96" width="320" height="184" rx="14"/></clipPath><clipPath id="c"><rect x="740" y="96" width="320" height="184" rx="14"/></clipPath>
    <style>
      .panel{fill:#24262d;stroke:#41444f;stroke-width:1.5}.title{fill:#f4f4f5;font:700 18px system-ui,sans-serif;letter-spacing:2px}.subtitle{fill:#a1a1aa;font:400 13px system-ui,sans-serif}.heading{fill:#fb7185;font:700 12px system-ui,sans-serif;letter-spacing:1.4px}.caption{fill:#b7b7bf;font:500 12px system-ui,sans-serif}.scan{animation:scan 3s ease-in-out infinite}.agent{transform-box:fill-box;transform-origin:center;animation:agent 4s ease-in-out infinite}.a2{animation-delay:.35s}.a3{animation-delay:.7s}.a4{animation-delay:1.05s}.ring{stroke-dasharray:201;stroke-dashoffset:201;animation:ring 5s ease-in-out infinite}.verified{animation:verified 5s ease-in-out infinite}@keyframes scan{0%,100%{transform:translateY(-38px);opacity:.25}50%{transform:translateY(38px);opacity:1}}@keyframes agent{0%,20%,100%{opacity:.45}38%,78%{opacity:1}}@keyframes ring{0%,30%{stroke-dashoffset:201}70%,100%{stroke-dashoffset:20}}@keyframes verified{0%,58%{opacity:.25}72%,100%{opacity:1}}@media(prefers-reduced-motion:reduce){*{animation:none!important}.ring{stroke-dashoffset:20}.agent,.verified{opacity:1}}
    </style>
  </defs>
  <rect width="1100" height="320" rx="18" fill="url(#bg)"/><rect width="5" height="320" rx="2.5" fill="#e11d48"/>
  <text x="40" y="40" class="title">REDQUORUM</text><text x="40" y="67" class="subtitle">Scan targets. Debate findings. Report only what reaches consensus.</text>
  <rect x="40" y="96" width="320" height="184" rx="14" class="panel"/><g clip-path="url(#a)"><text x="64" y="126" class="heading">01  SCAN</text><rect x="96" y="148" width="208" height="91" rx="8" fill="#16181d" stroke="#454852"/><g stroke="#6b7280" stroke-width="5" stroke-linecap="round"><path d="M118 172h104"/><path d="M118 193h152"/><path d="M118 214h81"/></g><g class="scan"><rect x="102" y="190" width="196" height="3" fill="#fb7185"/><rect x="102" y="190" width="196" height="13" fill="#e11d48" opacity=".1"/></g><text x="200" y="264" text-anchor="middle" class="caption">Inspect code, APIs and web applications</text></g>
  <path d="M368 188h14m-5-5 5 5-5 5" fill="none" stroke="#e11d48" stroke-width="2"/>
  <rect x="390" y="96" width="320" height="184" rx="14" class="panel"/><g clip-path="url(#b)"><text x="414" y="126" class="heading">02  DEBATE</text><path d="M475 168 550 194 625 168M475 228l75-34 75 34" fill="none" stroke="#51545e" stroke-width="1.5"/><g class="agent"><circle cx="475" cy="168" r="25" fill="#351c25" stroke="#e11d48"/><text x="475" y="172" text-anchor="middle" class="caption">OPP.</text></g><g class="agent a2"><circle cx="625" cy="168" r="25" fill="#351c25" stroke="#e11d48"/><text x="625" y="172" text-anchor="middle" class="caption">INS.</text></g><g class="agent a3"><circle cx="475" cy="228" r="25" fill="#351c25" stroke="#e11d48"/><text x="475" y="232" text-anchor="middle" class="caption">PRO</text></g><g class="agent a4"><circle cx="625" cy="228" r="25" fill="#351c25" stroke="#e11d48"/><text x="625" y="232" text-anchor="middle" class="caption">MOD.</text></g><circle cx="550" cy="194" r="27" fill="#e11d48"/><text x="550" y="198" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="9" font-weight="800">FINDING</text><text x="550" y="264" text-anchor="middle" class="caption">Specialists evaluate impact and evidence</text></g>
  <path d="M718 188h14m-5-5 5 5-5 5" fill="none" stroke="#e11d48" stroke-width="2"/>
  <rect x="740" y="96" width="320" height="184" rx="14" class="panel"/><g clip-path="url(#c)"><text x="764" y="126" class="heading">03  QUORUM</text><circle cx="900" cy="191" r="48" fill="#17191e" stroke="#454852" stroke-width="7"/><circle cx="900" cy="191" r="29" fill="none" stroke="#fb7185" stroke-width="7" class="ring" transform="rotate(-90 900 191)"/><text x="900" y="190" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="19" font-weight="800">90%</text><text x="900" y="207" text-anchor="middle" class="caption">CONSENSUS</text><text x="900" y="264" text-anchor="middle" class="caption">Promote trusted findings only</text></g>
</svg>
