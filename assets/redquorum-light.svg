<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">RedQuorum security consensus pipeline</title>
  <desc id="desc">An animated diagram showing a target scanned, four security agents debating findings, and a quorum approving a verified result.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff7f8"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <radialGradient id="red"><stop stop-color="#fb7185"/><stop offset="1" stop-color="#be123c"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .panel{fill:#fff;stroke:#d8dee8;stroke-width:2}.label{fill:#172033;font:700 20px system-ui,sans-serif;letter-spacing:3px}.small{fill:#596579;font:500 14px system-ui,sans-serif}.step{fill:#be123c;font:700 13px system-ui,sans-serif}.wire{fill:none;stroke:#e11d48;stroke-width:2.5;stroke-dasharray:7 11;animation:flow 1.5s linear infinite}.scan{animation:scan 2.8s ease-in-out infinite}.vote{transform-box:fill-box;transform-origin:center;animation:vote 3.2s ease-in-out infinite}.v2{animation-delay:.3s}.v3{animation-delay:.6s}.v4{animation-delay:.9s}.ring{fill:none;stroke:#e11d48;stroke-width:9;stroke-dasharray:270;stroke-dashoffset:270;transform:rotate(-90deg);transform-origin:1000px 219px;animation:ring 4s ease-in-out infinite}.approved{animation:approved 4s ease-in-out infinite}.pulse{animation:pulse 1.8s ease-in-out infinite}@keyframes flow{to{stroke-dashoffset:-18}}@keyframes scan{0%,100%{transform:translateY(-62px);opacity:.25}50%{transform:translateY(62px);opacity:1}}@keyframes vote{0%,20%{opacity:.2;transform:scale(.8)}40%,85%{opacity:1;transform:scale(1)}100%{opacity:.2}}@keyframes ring{0%,32%{stroke-dashoffset:270}72%,100%{stroke-dashoffset:27}}@keyframes approved{0%,58%{opacity:0;transform:translateY(8px)}72%,100%{opacity:1;transform:translateY(0)}}@keyframes pulse{50%{opacity:.45}}@media(prefers-reduced-motion:reduce){*{animation:none!important}.ring{stroke-dashoffset:27}.approved{opacity:1}}
    </style>
  </defs>
  <rect width="1200" height="380" rx="22" fill="url(#bg)" stroke="#e5e7eb"/><path d="M0 1h1200" stroke="#e11d48" stroke-width="3"/>
  <text x="48" y="48" class="label">REDQUORUM</text><text x="48" y="76" class="small">Security findings move forward only when specialist agents reach consensus.</text>
  <rect x="48" y="106" width="265" height="224" rx="16" class="panel"/><text x="76" y="143" class="step">01  SCAN TARGET</text>
  <rect x="80" y="166" width="201" height="124" rx="9" fill="#f8fafc" stroke="#cbd5e1"/><rect x="100" y="190" width="111" height="5" rx="2" fill="#94a3b8"/><rect x="100" y="211" width="146" height="5" rx="2" fill="#94a3b8"/><rect x="100" y="232" width="82" height="5" rx="2" fill="#94a3b8"/><rect x="100" y="253" width="129" height="5" rx="2" fill="#94a3b8"/>
  <g class="scan" filter="url(#glow)"><rect x="87" y="224" width="187" height="3" fill="#e11d48"/><rect x="87" y="224" width="187" height="18" fill="#e11d48" opacity=".1"/></g>
  <path d="M326 218h76" class="wire"/>
  <rect x="389" y="106" width="407" height="224" rx="16" class="panel"/><text x="417" y="143" class="step">02  PARLIAMENT DEBATE</text><path d="M510 193 592 218 674 193M510 266l82-48 82 48M592 218v-51" stroke="#cbd5e1" stroke-width="2"/>
  <g class="vote"><circle cx="510" cy="193" r="32" fill="#fff1f2" stroke="#e11d48"/><text x="510" y="190" text-anchor="middle" class="small">OPP.</text><text x="510" y="208" text-anchor="middle" fill="#be123c" font-family="system-ui" font-size="11">VOTE</text></g>
  <g class="vote v2"><circle cx="674" cy="193" r="32" fill="#fff1f2" stroke="#e11d48"/><text x="674" y="190" text-anchor="middle" class="small">INSIDER</text><text x="674" y="208" text-anchor="middle" fill="#be123c" font-family="system-ui" font-size="11">VOTE</text></g>
  <g class="vote v3"><circle cx="510" cy="266" r="32" fill="#fff1f2" stroke="#e11d48"/><text x="510" y="263" text-anchor="middle" class="small">PRO</text><text x="510" y="281" text-anchor="middle" fill="#be123c" font-family="system-ui" font-size="11">VOTE</text></g>
  <g class="vote v4"><circle cx="674" cy="266" r="32" fill="#fff1f2" stroke="#e11d48"/><text x="674" y="263" text-anchor="middle" class="small">MOD.</text><text x="674" y="281" text-anchor="middle" fill="#be123c" font-family="system-ui" font-size="11">VERIFY</text></g>
  <circle cx="592" cy="218" r="29" fill="url(#red)" class="pulse" filter="url(#glow)"/><text x="592" y="223" text-anchor="middle" fill="#fff" font-family="system-ui" font-weight="800" font-size="12">FINDING</text>
  <path d="M809 218h72" class="wire"/>
  <rect x="868" y="106" width="284" height="224" rx="16" class="panel"/><text x="896" y="143" class="step">03  REACH QUORUM</text>
  <circle cx="1000" cy="219" r="61" fill="#f8fafc" stroke="#d8dee8" stroke-width="9"/><circle cx="1000" cy="219" r="43" fill="url(#red)" opacity=".1"/><circle cx="1000" cy="219" r="43" class="ring" filter="url(#glow)"/>
  <text x="1000" y="216" text-anchor="middle" fill="#172033" font-family="system-ui" font-size="26" font-weight="800">90%</text><text x="1000" y="239" text-anchor="middle" class="small">CONSENSUS</text>
  <g class="approved"><rect x="922" y="293" width="156" height="24" rx="12" fill="#fff1f2" stroke="#e11d48"/><text x="1000" y="310" text-anchor="middle" fill="#be123c" font-family="system-ui" font-size="11" font-weight="700">VERIFIED FINDING</text></g>
</svg>
