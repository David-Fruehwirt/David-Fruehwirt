<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320" viewBox="0 0 1100 320" role="img" aria-labelledby="title desc">
  <title id="title">EmberExchange economy</title>
  <desc id="desc">Three contained animated panels show forging a collectible, tracking its investment value, and listing it on the marketplace.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#202020"/><stop offset="1" stop-color="#171717"/></linearGradient>
    <linearGradient id="heat" x1="0" y1="1" x2="0" y2="0"><stop stop-color="#e85d04"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
    <clipPath id="forgeClip"><rect x="40" y="96" width="320" height="184" rx="14"/></clipPath>
    <clipPath id="investClip"><rect x="390" y="96" width="320" height="184" rx="14"/></clipPath>
    <clipPath id="marketClip"><rect x="740" y="96" width="320" height="184" rx="14"/></clipPath>
    <style>
      .panel{fill:#2a2a2a;stroke:#444;stroke-width:1.5}.title{fill:#e8e6e3;font:700 18px system-ui,sans-serif;letter-spacing:2px}.subtitle{fill:#a0a0a0;font:400 13px system-ui,sans-serif}.heading{fill:#e85d04;font:700 12px system-ui,sans-serif;letter-spacing:1.4px}.caption{fill:#b8b5b0;font:500 12px system-ui,sans-serif}.muted{stroke:#5a5a5a}.accent{stroke:#e85d04}.hammer{transform-box:fill-box;transform-origin:85% 85%;animation:hammer 2.8s ease-in-out infinite}.spark{animation:spark 2.8s ease-out infinite}.s2{animation-delay:.12s}.s3{animation-delay:.24s}.value{stroke-dasharray:220;stroke-dashoffset:220;animation:value 5s ease-in-out infinite}.coin{transform-box:fill-box;transform-origin:center;animation:coin 3s ease-in-out infinite}.listing{animation:listing 4s ease-in-out infinite}.sold{animation:sold 4s ease-in-out infinite}@keyframes hammer{0%,32%,100%{transform:rotate(-5deg)}43%,53%{transform:rotate(14deg)}}@keyframes spark{0%,40%,100%{opacity:0}48%{opacity:1}65%{opacity:0}}@keyframes value{0%,12%{stroke-dashoffset:220}58%,100%{stroke-dashoffset:0}}@keyframes coin{50%{transform:scale(1.08)}}@keyframes listing{0%,35%{opacity:.35}50%,100%{opacity:1}}@keyframes sold{0%,58%{opacity:0}72%,100%{opacity:1}}@media(prefers-reduced-motion:reduce){*{animation:none!important}.value{stroke-dashoffset:0}.listing,.sold{opacity:1}}
    </style>
  </defs>
  <rect width="1100" height="320" rx="18" fill="url(#bg)"/>
  <rect x="0" y="0" width="5" height="320" rx="2.5" fill="#e85d04"/>
  <text x="40" y="40" class="title">EMBEREXCHANGE</text>
  <text x="40" y="67" class="subtitle">Forge collectibles. Follow value. Trade on a player-driven marketplace.</text>

  <rect x="40" y="96" width="320" height="184" rx="14" class="panel"/>
  <g clip-path="url(#forgeClip)">
    <text x="64" y="126" class="heading">01  FORGE</text>
    <path d="M123 220h143l-16 24H139z" fill="#555"/><rect x="143" y="208" width="103" height="16" rx="3" fill="#777"/>
    <path d="M177 208c-7-20 9-27 6-47 19 13 9 25 19 34 11-12 8-21 8-29 22 18 18 31 12 42z" fill="url(#heat)"/>
    <g class="hammer"><rect x="191" y="138" width="13" height="70" rx="5" fill="#a3a3a3" transform="rotate(-38 198 173)"/><rect x="159" y="135" width="57" height="25" rx="5" fill="#d4d4d4" transform="rotate(-38 188 148)"/></g>
    <g fill="#f59e0b"><circle class="spark" cx="205" cy="199" r="3"/><circle class="spark s2" cx="218" cy="202" r="2.5"/><circle class="spark s3" cx="194" cy="203" r="2"/></g>
    <text x="200" y="264" text-anchor="middle" class="caption">Create scarce stove collectibles</text>
  </g>

  <path d="M368 188h14m-5-5 5 5-5 5" fill="none" stroke="#e85d04" stroke-width="2"/>

  <rect x="390" y="96" width="320" height="184" rx="14" class="panel"/>
  <g clip-path="url(#investClip)">
    <text x="414" y="126" class="heading">02  INVEST</text>
    <path d="M434 232V154M434 232h230" fill="none" class="muted" stroke-width="1.5"/>
    <path d="m450 215 42-23 39 10 46-35 64-22" fill="none" stroke="#6b442d" stroke-width="4" stroke-linecap="round"/>
    <path d="m450 215 42-23 39 10 46-35 64-22" fill="none" class="accent value" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g class="coin"><circle cx="492" cy="164" r="21" fill="#e85d04"/><circle cx="492" cy="164" r="14" fill="none" stroke="#ffd1b3" stroke-width="1.5"/><text x="492" y="169" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="800">E</text></g>
    <path d="m632 143 12-3-4 12" fill="#e85d04"/>
    <text x="550" y="264" text-anchor="middle" class="caption">Track rarity, ownership and price history</text>
  </g>

  <path d="M718 188h14m-5-5 5 5-5 5" fill="none" stroke="#e85d04" stroke-width="2"/>

  <rect x="740" y="96" width="320" height="184" rx="14" class="panel"/>
  <g clip-path="url(#marketClip)">
    <text x="764" y="126" class="heading">03  MARKETPLACE</text>
    <g class="listing"><rect x="780" y="148" width="100" height="83" rx="9" fill="#333" stroke="#555"/><path d="M810 210h40l-4-35h-32z" fill="#e85d04"/><path d="M820 175v-10h20v10" fill="none" stroke="#f5b58d" stroke-width="4"/></g>
    <path d="M896 181h43m-8-7 9 7-9 7M940 204h-43m8-7-9 7 9 7" fill="none" stroke="#e85d04" stroke-width="2"/>
    <rect x="956" y="148" width="68" height="83" rx="9" fill="#333" stroke="#555"/><circle cx="990" cy="185" r="20" fill="#f59e0b"/><text x="990" y="190" text-anchor="middle" fill="#292929" font-family="system-ui" font-size="11" font-weight="800">E</text>
    <g class="sold"><rect x="956" y="216" width="68" height="21" rx="10.5" fill="#173c29"/><text x="990" y="230" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="10" font-weight="700">TRADED</text></g>
    <text x="900" y="264" text-anchor="middle" class="caption">Buy, sell and grow the collection</text>
  </g>
</svg>
