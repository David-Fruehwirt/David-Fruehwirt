<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">EmberExchange feature showcase</title>
  <desc id="desc">An animated showcase cycles through opening lootboxes, collecting and trading stoves, forging and tracking value, and playing card games.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#181818"/><stop offset="1" stop-color="#24201d"/></linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#e85d04"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fcd34d"/><stop offset="1" stop-color="#d97706"/></linearGradient>
    <linearGradient id="forge" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#f97316"/><stop offset="1" stop-color="#7f1d1d"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".38"/></filter>
  </defs>
  <style>
    .slide{opacity:0}.s1{animation:s1 16s ease-in-out infinite}.s2{animation:s2 16s ease-in-out infinite}.s3{animation:s3 16s ease-in-out infinite}.s4{animation:s4 16s ease-in-out infinite}
    .title{fill:#f4f4f5;font:800 24px system-ui,sans-serif;letter-spacing:2px}.subtitle{fill:#b8b5b0;font:400 15px system-ui,sans-serif}.feature{fill:#f4f4f5;font:800 30px system-ui,sans-serif}.copy{fill:#c8c5c0;font:400 17px system-ui,sans-serif}.label{fill:#fb923c;font:800 13px system-ui,sans-serif;letter-spacing:1.5px}.ui-title{fill:#f4f4f5;font:800 16px system-ui,sans-serif}.ui-copy{fill:#aaa7a2;font:600 12px system-ui,sans-serif}.white{fill:#fff}.coin{fill:#fbbf24;font:800 12px system-ui,sans-serif}.playing{fill:#27272a;font:800 20px Georgia,serif}
    @keyframes s1{0%,21%{opacity:1}25%,96%{opacity:0}100%{opacity:1}}@keyframes s2{0%,22%,48%,100%{opacity:0}26%,45%{opacity:1}}@keyframes s3{0%,47%,73%,100%{opacity:0}51%,70%{opacity:1}}@keyframes s4{0%,72%,99%{opacity:0}76%,96%{opacity:1}}
    @media(prefers-reduced-motion:reduce){.slide{animation:none!important;opacity:0}.s1{opacity:1}}
  </style>
  <rect width="1100" height="560" rx="22" fill="url(#page)" stroke="#3f3a36"/><rect width="7" height="560" rx="3.5" fill="#e85d04"/>
  <text x="40" y="43" class="title">EMBEREXCHANGE</text><text x="40" y="70" class="subtitle">Collect, trade, forge and play in one shared economy.</text>
  <rect x="32" y="92" width="1036" height="420" rx="22" fill="#2a2a2a" stroke="#48433f" filter="url(#shadow)"/>

  <g class="slide s1">
    <rect x="58" y="118" width="500" height="368" rx="20" fill="#332820" stroke="#6b4423"/><circle cx="308" cy="298" r="137" fill="#3f2a1d"/><circle cx="308" cy="298" r="106" fill="#633717" opacity=".55"/>
    <path d="M248 247h120l-12 142h-96z" fill="#8b5a2b" stroke="#3b2412" stroke-width="5"/><path d="M235 237q73-55 146 0l-13 36H248z" fill="url(#gold)" stroke="#92400e" stroke-width="5"/><rect x="241" y="275" width="134" height="42" rx="8" fill="#b87333" stroke="#3b2412" stroke-width="5"/><rect x="292" y="291" width="32" height="45" rx="6" fill="#fbbf24" stroke="#92400e" stroke-width="4"/>
    <path d="M275 219q32-70 65 0-8-42-29-64-21 25-36 64z" fill="#fb923c"/><path d="M291 218q17-40 34 0-5-25-16-36-11 14-18 36z" fill="#fef3c7"/>
    <rect x="86" y="144" width="94" height="27" rx="13.5" fill="#64748b"/><text x="133" y="162" text-anchor="middle" class="white" font-family="system-ui" font-size="11" font-weight="800">COMMON</text><rect x="436" y="144" width="92" height="27" rx="13.5" fill="#9333ea"/><text x="482" y="162" text-anchor="middle" class="white" font-family="system-ui" font-size="11" font-weight="800">EPIC</text><rect x="87" y="435" width="104" height="27" rx="13.5" fill="#2563eb"/><text x="139" y="453" text-anchor="middle" class="white" font-family="system-ui" font-size="11" font-weight="800">RARE</text><rect x="417" y="435" width="112" height="27" rx="13.5" fill="url(#gold)"/><text x="473" y="453" text-anchor="middle" fill="#7c2d12" font-family="system-ui" font-size="11" font-weight="800">LEGENDARY</text>
    <text x="614" y="147" class="label">01 / 04 · LOOTBOXES</text><text x="614" y="193" class="feature">Open the chest</text><text x="614" y="233" class="copy"><tspan x="614">Open animated lootboxes and discover</tspan><tspan x="614" dy="28">new stoves with different rarities.</tspan></text>
    <rect x="614" y="317" width="389" height="94" rx="16" fill="#332820" stroke="#654321"/><circle cx="653" cy="350" r="19" fill="url(#ember)"/><path d="M647 352q6-22 13 0-2-12-6-17-5 7-7 17z" fill="#fff"/><text x="686" y="347" class="ui-title">Every opening feels different</text><text x="686" y="372" class="ui-copy">Weighted drops · Special chests · Rare finds</text><rect x="614" y="431" width="172" height="38" rx="12" fill="url(#ember)"/><text x="700" y="456" text-anchor="middle" class="white" font-family="system-ui" font-size="14" font-weight="800">OPEN LOOTBOX</text>
  </g>

  <g class="slide s2">
    <rect x="58" y="118" width="500" height="368" rx="20" fill="#24282f" stroke="#444"/><text x="88" y="153" class="ui-title">Marketplace</text><rect x="407" y="134" width="120" height="31" rx="15.5" fill="#44351f"/><circle cx="428" cy="149.5" r="10" fill="#fbbf24"/><text x="446" y="154" class="coin">12,480 coins</text>
    <g transform="translate(82 184)"><rect width="136" height="253" rx="16" fill="#2f333b" stroke="#3b82f6" stroke-width="3"/><rect x="12" y="13" width="112" height="126" rx="12" fill="#1e3a5f"/><path d="M43 112h55v-48H43zm8-61h40l7 13H43z" fill="#64748b" stroke="#cbd5e1" stroke-width="3"/><rect x="53" y="76" width="14" height="25" fill="#334155"/><rect x="18" y="151" width="50" height="22" rx="11" fill="#2563eb"/><text x="43" y="166" text-anchor="middle" class="white" font-family="system-ui" font-size="9" font-weight="800">RARE</text><text x="18" y="197" class="ui-title">Forest Stove</text><circle cx="27" cy="222" r="9" fill="#fbbf24"/><text x="43" y="227" class="coin">420</text></g>
    <g transform="translate(239 184)"><rect width="136" height="253" rx="16" fill="#2f333b" stroke="#a855f7" stroke-width="3"/><rect x="12" y="13" width="112" height="126" rx="12" fill="#42205f"/><path d="M41 112h59V63H41zm9-65h41l9 16H41z" fill="#a855f7" stroke="#d8b4fe" stroke-width="3"/><circle cx="70" cy="87" r="14" fill="#fef3c7"/><rect x="18" y="151" width="50" height="22" rx="11" fill="#9333ea"/><text x="43" y="166" text-anchor="middle" class="white" font-family="system-ui" font-size="9" font-weight="800">EPIC</text><text x="18" y="197" class="ui-title">Magic Stove</text><circle cx="27" cy="222" r="9" fill="#fbbf24"/><text x="43" y="227" class="coin">1,250</text></g>
    <g transform="translate(396 184)"><rect width="136" height="253" rx="16" fill="#2f333b" stroke="#f59e0b" stroke-width="3"/><rect x="12" y="13" width="112" height="126" rx="12" fill="#4a3515"/><path d="M40 112h61V61H40zm10-67h41l10 16H40z" fill="#fbbf24" stroke="#fde68a" stroke-width="3"/><path d="M55 102l15-30 16 30" fill="none" stroke="#fff" stroke-width="5"/><rect x="18" y="151" width="77" height="22" rx="11" fill="url(#gold)"/><text x="56" y="166" text-anchor="middle" fill="#7c2d12" font-family="system-ui" font-size="9" font-weight="800">LEGENDARY</text><text x="18" y="197" class="ui-title">Golden Stove</text><circle cx="27" cy="222" r="9" fill="#fbbf24"/><text x="43" y="227" class="coin">4,800</text></g>
    <text x="614" y="147" class="label">02 / 04 · COLLECTION</text><text x="614" y="193" class="feature">Collect and trade</text><text x="614" y="233" class="copy"><tspan x="614">Build your collection and trade stoves</tspan><tspan x="614" dy="28">with other players in the marketplace.</tspan></text>
    <rect x="614" y="317" width="389" height="94" rx="16" fill="#30343b" stroke="#4b5563"/><text x="638" y="348" class="ui-title">A player-driven economy</text><text x="638" y="376" class="ui-copy">Set a price · Make an offer · Find rare items</text><rect x="614" y="431" width="186" height="38" rx="12" fill="url(#ember)"/><text x="707" y="456" text-anchor="middle" class="white" font-family="system-ui" font-size="14" font-weight="800">VIEW MARKETPLACE</text>
  </g>

  <g class="slide s3">
    <rect x="58" y="118" width="500" height="368" rx="20" fill="#302720" stroke="#654321"/><rect x="84" y="143" width="448" height="140" rx="17" fill="#2f2f2f" stroke="#654321"/><text x="107" y="174" class="ui-title">Forge</text>
    <path d="M119 250h93l-12-72h-69z" fill="#475569" stroke="#111827" stroke-width="4"/><path d="M139 219q25-61 51 0-6-34-25-53-18 20-26 53z" fill="url(#forge)"/><rect x="240" y="181" width="105" height="69" rx="12" fill="#374151" stroke="#64748b"/><path d="M265 229h55v-30h-55zm8-41h39l8 11h-55z" fill="#64748b" stroke="#cbd5e1" stroke-width="2"/><path d="M365 216h42" stroke="#fb923c" stroke-width="5" stroke-linecap="round"/><path d="M397 205l13 11-13 11" fill="none" stroke="#fb923c" stroke-width="5"/><rect x="429" y="181" width="78" height="69" rx="12" fill="#4a3515" stroke="#f59e0b"/><path d="M448 230h41v-30h-41zm6-39h29l6 9h-41z" fill="#fbbf24" stroke="#fde68a" stroke-width="2"/>
    <rect x="84" y="304" width="448" height="154" rx="17" fill="#2f2f2f" stroke="#444"/><text x="107" y="337" class="ui-title">Price history</text><text x="448" y="337" class="coin">+38.4%</text><path d="M111 423L160 400 205 411 252 370 300 385 350 346 400 365 452 332 505 350" fill="none" stroke="#fb923c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><path d="M111 423L160 400 205 411 252 370 300 385 350 346 400 365 452 332 505 350V438H111z" fill="#e85d04" opacity=".13"/>
    <text x="614" y="147" class="label">03 / 04 · FORGE &amp; VALUE</text><text x="614" y="193" class="feature">Forge and follow value</text><text x="614" y="233" class="copy"><tspan x="614">Use the forge to create new items, then</tspan><tspan x="614" dy="28">follow prices and ownership over time.</tspan></text>
    <rect x="614" y="317" width="389" height="94" rx="16" fill="#332820" stroke="#654321"/><text x="638" y="348" class="ui-title">Know your collection</text><text x="638" y="376" class="ui-copy">Price history · Previous owners · Statistics</text><rect x="614" y="431" width="164" height="38" rx="12" fill="url(#ember)"/><text x="696" y="456" text-anchor="middle" class="white" font-family="system-ui" font-size="14" font-weight="800">START FORGING</text>
  </g>

  <g class="slide s4">
    <rect x="58" y="118" width="500" height="368" rx="20" fill="#091f18" stroke="#166534"/><ellipse cx="308" cy="302" rx="214" ry="145" fill="#14532d" stroke="#d4a72c" stroke-width="8"/><ellipse cx="308" cy="302" rx="166" ry="101" fill="none" stroke="#fff" stroke-opacity=".16" stroke-width="3"/>
    <g transform="translate(265 245) rotate(-8)"><rect width="72" height="104" rx="8" fill="#fff" stroke="#ddd" stroke-width="2"/><text x="14" y="28" class="playing" fill="#dc2626">A</text><text x="36" y="68" text-anchor="middle" fill="#dc2626" font-size="34">♥</text></g><g transform="translate(323 241) rotate(8)"><rect width="72" height="104" rx="8" fill="#fff" stroke="#ddd" stroke-width="2"/><text x="14" y="28" class="playing">K</text><text x="36" y="68" text-anchor="middle" fill="#27272a" font-size="34">♠</text></g>
    <circle cx="206" cy="361" r="28" fill="#2563eb" stroke="#fff" stroke-width="4"/><circle cx="206" cy="361" r="15" fill="none" stroke="#fff" stroke-dasharray="5 4"/><circle cx="244" cy="378" r="28" fill="#dc2626" stroke="#fff" stroke-width="4"/><circle cx="244" cy="378" r="15" fill="none" stroke="#fff" stroke-dasharray="5 4"/><circle cx="391" cy="369" r="28" fill="#f59e0b" stroke="#fff" stroke-width="4"/><circle cx="391" cy="369" r="15" fill="none" stroke="#fff" stroke-dasharray="5 4"/>
    <rect x="126" y="146" width="112" height="36" rx="18" fill="#fff" fill-opacity=".12"/><text x="182" y="169" text-anchor="middle" class="white" font-family="system-ui" font-size="13" font-weight="800">POKER</text><rect x="251" y="146" width="132" height="36" rx="18" fill="#fff" fill-opacity=".12"/><text x="317" y="169" text-anchor="middle" class="white" font-family="system-ui" font-size="13" font-weight="800">BLACKJACK</text><rect x="396" y="146" width="116" height="36" rx="18" fill="#fff" fill-opacity=".12"/><text x="454" y="169" text-anchor="middle" class="white" font-family="system-ui" font-size="13" font-weight="800">ROULETTE</text>
    <text x="614" y="147" class="label">04 / 04 · REAL-TIME GAMES</text><text x="614" y="193" class="feature">Play together</text><text x="614" y="233" class="copy"><tspan x="614">Join game rooms and play Poker, Blackjack,</tspan><tspan x="614" dy="28">or Roulette using the same coin balance.</tspan></text>
    <rect x="614" y="317" width="389" height="94" rx="16" fill="#163328" stroke="#166534"/><circle cx="653" cy="364" r="22" fill="#16a34a"/><text x="653" y="370" text-anchor="middle" class="white" font-family="system-ui" font-size="18" font-weight="800">●</text><text x="686" y="348" class="ui-title">Games update live</text><text x="686" y="376" class="ui-copy">Multiplayer rooms · Live turns · Shared economy</text><rect x="614" y="431" width="154" height="38" rx="12" fill="url(#ember)"/><text x="691" y="456" text-anchor="middle" class="white" font-family="system-ui" font-size="14" font-weight="800">JOIN A GAME</text>
  </g>
  <g fill="#5a5550"><circle cx="514" cy="536" r="6"/><circle cx="538" cy="536" r="6"/><circle cx="562" cy="536" r="6"/><circle cx="586" cy="536" r="6"/></g><g class="slide s1"><circle cx="514" cy="536" r="7" fill="#fb923c"/></g><g class="slide s2"><circle cx="538" cy="536" r="7" fill="#fb923c"/></g><g class="slide s3"><circle cx="562" cy="536" r="7" fill="#fb923c"/></g><g class="slide s4"><circle cx="586" cy="536" r="7" fill="#fb923c"/></g>
</svg>
