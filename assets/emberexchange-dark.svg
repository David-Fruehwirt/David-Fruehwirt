<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">EmberExchange economy loop</title>
  <desc id="desc">An animated diagram showing a collectible forged, its value increasing, and the item traded in a marketplace.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/><stop offset="1" stop-color="#090d14"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="1" x2="0" y2="0">
      <stop stop-color="#f97316"/><stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .panel{fill:#151d2a;stroke:#2c394b;stroke-width:2}.muted{fill:#8d9aae}.label{fill:#f3f4f6;font:700 20px system-ui,sans-serif;letter-spacing:3px}.small{fill:#9ca3af;font:500 14px system-ui,sans-serif}.accent{fill:#fb923c}.line{fill:none;stroke:#fb923c;stroke-width:3;stroke-linecap:round}.flow{stroke-dasharray:10 14;animation:flow 1.4s linear infinite}.hammer{transform-origin:190px 102px;animation:hammer 1.8s ease-in-out infinite}.spark{animation:spark 1.8s ease-out infinite}.spark.s2{animation-delay:.18s}.spark.s3{animation-delay:.3s}.fire{animation:pulse 1.2s ease-in-out infinite}.coin{animation:coin 3.6s ease-in-out infinite}.chart{stroke-dasharray:260;stroke-dashoffset:260;animation:draw 3.6s ease-in-out infinite}.card{animation:card 3.6s ease-in-out infinite}.arrow{animation:fade 1.8s ease-in-out infinite}.step{fill:#fb923c;font:700 13px system-ui,sans-serif}.num{fill:#101722;font:800 12px system-ui,sans-serif}@keyframes hammer{0%,38%,100%{transform:rotate(-18deg)}48%,58%{transform:rotate(26deg)}}@keyframes spark{0%,42%,100%{opacity:0;transform:translate(0,0)}52%{opacity:1}75%{opacity:0;transform:translate(15px,-30px)}}@keyframes pulse{50%{opacity:.55;transform:translateY(3px)}}@keyframes flow{to{stroke-dashoffset:-24}}@keyframes coin{0%,12%{transform:translate(0,0);opacity:0}24%,58%{transform:translate(0,-13px);opacity:1}72%,100%{transform:translate(0,0);opacity:.45}}@keyframes draw{0%,18%{stroke-dashoffset:260}58%,100%{stroke-dashoffset:0}}@keyframes card{0%,55%{transform:translateY(8px);opacity:.55}70%,100%{transform:translateY(0);opacity:1}}@keyframes fade{50%{opacity:.35}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="1200" height="380" rx="22" fill="url(#bg)"/>
  <path d="M0 1h1200" stroke="#fb923c" stroke-width="3" opacity=".8"/>
  <text x="48" y="48" class="label">EMBEREXCHANGE</text>
  <text x="48" y="76" class="small">A player-driven economy built around collecting, investing and trading.</text>

  <rect x="48" y="106" width="320" height="224" rx="16" class="panel"/>
  <circle cx="78" cy="136" r="13" class="accent"/><text x="74" y="141" class="num">1</text>
  <text x="102" y="143" class="step">FORGE</text>
  <path d="M139 273h155l-17 27H156z" fill="#3c4655"/>
  <path d="M160 263h113v18H160z" fill="#667386"/>
  <g class="fire" filter="url(#glow)"><path d="M193 263c-16-26 11-31 4-57 24 16 9 28 25 41 13-15 11-26 8-37 30 25 22 43 14 53z" fill="url(#ember)"/></g>
  <g class="hammer"><rect x="184" y="127" width="18" height="96" rx="7" fill="#9aa5b1" transform="rotate(-35 193 175)"/><rect x="141" y="125" width="75" height="33" rx="7" fill="#d2d8df" transform="rotate(-35 178 141)"/></g>
  <g fill="#fbbf24"><circle class="spark" cx="223" cy="239" r="4"/><circle class="spark s2" cx="237" cy="247" r="3"/><circle class="spark s3" cx="211" cy="247" r="3"/></g>
  <text x="208" y="315" text-anchor="middle" class="small">Create scarce collectibles</text>

  <path d="M382 218h86" class="line flow"/><path d="m455 206 15 12-15 12" class="line arrow"/>

  <rect x="456" y="106" width="288" height="224" rx="16" class="panel"/>
  <circle cx="486" cy="136" r="13" class="accent"/><text x="482" y="141" class="num">2</text>
  <text x="510" y="143" class="step">INVEST</text>
  <path d="M500 276V180M500 276h194" stroke="#39475a" stroke-width="2"/>
  <path d="m515 258 38-26 36 8 42-57 49-26" class="line chart" filter="url(#glow)"/>
  <g class="coin"><circle cx="554" cy="197" r="22" fill="#f59e0b"/><circle cx="554" cy="197" r="15" fill="none" stroke="#fde68a" stroke-width="2"/><text x="554" y="203" text-anchor="middle" class="num">E</text></g>
  <path d="m672 156-4 25-18-17z" fill="#fb923c"/>
  <text x="600" y="315" text-anchor="middle" class="small">Track rarity and market value</text>

  <path d="M758 218h82" class="line flow"/><path d="m827 206 15 12-15 12" class="line arrow"/>

  <rect x="828" y="106" width="324" height="224" rx="16" class="panel"/>
  <circle cx="858" cy="136" r="13" class="accent"/><text x="854" y="141" class="num">3</text>
  <text x="882" y="143" class="step">MARKETPLACE</text>
  <g class="card"><rect x="875" y="171" width="105" height="108" rx="10" fill="#202b3a" stroke="#435168"/><path d="M903 249h50l-5-47h-40z" fill="#fb923c"/><path d="M916 201v-13h24v13" fill="none" stroke="#ffd29b" stroke-width="5"/><text x="927" y="296" text-anchor="middle" class="small">LIST</text></g>
  <g class="card" style="animation-delay:.25s"><rect x="1000" y="171" width="105" height="108" rx="10" fill="#202b3a" stroke="#435168"/><circle cx="1052" cy="217" r="27" fill="#f59e0b"/><text x="1052" y="224" text-anchor="middle" class="num">E</text><text x="1052" y="296" text-anchor="middle" class="small">TRADE</text></g>
  <path d="M968 213h42m-9-8 10 8-10 8M1011 239h-42m9-8-10 8 10 8" class="line flow"/>
  <text x="990" y="315" text-anchor="middle" class="small">Buy, sell and grow a collection</text>
</svg>
