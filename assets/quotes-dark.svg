<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="170" viewBox="0 0 1100 170" role="img" aria-labelledby="title desc">
  <title id="title">Quotes from David Frühwirt</title>
  <desc id="desc">Six rotating quotes about programming, C pointers, TypeScript, and Fable 5.</desc>
  <style>
    .quote{fill:#f4f4f5;font:600 24px system-ui,sans-serif;text-anchor:middle;opacity:0}.mark{fill:#e85d04;font:700 42px Georgia,serif}.label{fill:#888;font:700 10px system-ui,sans-serif;letter-spacing:2px}
    .q1{animation:q1 24s infinite}.q2{animation:q2 24s infinite}.q3{animation:q3 24s infinite}.q4{animation:q4 24s infinite}.q5{animation:q5 24s infinite}.q6{animation:q6 24s infinite}
    @keyframes q1{0%,14%{opacity:1}16.5%,97.5%{opacity:0}100%{opacity:1}}@keyframes q2{0%,14.5%,31%,100%{opacity:0}17%,28.5%{opacity:1}}@keyframes q3{0%,31%,47.5%,100%{opacity:0}33.5%,45%{opacity:1}}@keyframes q4{0%,47.5%,64%,100%{opacity:0}50%,61.5%{opacity:1}}@keyframes q5{0%,64%,80.5%,100%{opacity:0}66.5%,78%{opacity:1}}@keyframes q6{0%,80.5%,97.5%,100%{opacity:0}83%,95%{opacity:1}}
    @media(prefers-reduced-motion:reduce){.quote{animation:none!important;opacity:0}.q1{opacity:1}}
  </style>
  <rect width="1100" height="170" rx="16" fill="#1c1c1f" stroke="#38383f"/>
  <text x="40" y="35" class="label">FROM THE DEVELOPER</text><text x="55" y="112" class="mark">“</text>
  <text x="550" y="101" class="quote q1">"Scared of C pointers"</text>
  <text x="550" y="101" class="quote q2">"Typescript is ALWAYS better than JavaScript"</text>
  <text x="550" y="101" class="quote q3">"See? C?"</text>
  <text x="550" y="101" class="quote q4">"....because you can't C#! You get it? No? Aww :("</text>
  <text x="550" y="101" class="quote q5">"If it works it works, don't question it"</text>
  <text x="550" y="101" class="quote q6">"Fable 5 is BACK (I'm too broke to use it)"</text>
</svg>
